<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do Liburan - Perencanaan</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            animation: slideUp 0.6s ease-out;
        }
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .header h1 {
            font-size: 2em;
            margin-bottom: 10px;
            font-weight: 700;
        }
        .header p {
            opacity: 0.9;
            font-weight: 400;
        }
        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.3s ease;
        }
        .back-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }
        .content {
            padding: 30px;
        }
        .add-form {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }
        .add-input {
            flex: 1;
            padding: 15px;
            border: 2px solid #e1e5e9;
            border-radius: 10px;
            font-size: 1em;
            font-family: 'Poppins', sans-serif;
            transition: border-color 0.3s ease;
        }
        .add-input:focus {
            outline: none;
            border-color: #667eea;
        }
        .add-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 25px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            font-family: 'Poppins', sans-serif;
            transition: all 0.3s ease;
        }
        .add-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }
        .todo-list {
            list-style: none;
        }
        .todo-item {
            display: flex;
            align-items: center;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            margin-bottom: 10px;
            transition: all 0.3s ease;
            border-left: 4px solid #667eea;
        }
        .todo-item.completed {
            background: #e8f5e8;
            border-left-color: #28a745;
        }
        .todo-item.completed .todo-text {
            text-decoration: line-through;
            color: #6c757d;
        }
        .todo-checkbox {
            width: 20px;
            height: 20px;
            margin-right: 15px;
            cursor: pointer;
        }
        .todo-text {
            flex: 1;
            font-size: 1em;
            color: #333;
            font-weight: 500;
        }
        .todo-actions {
            display: flex;
            gap: 10px;
        }
        .delete-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.8em;
            transition: background 0.3s ease;
        }
        .delete-btn:hover {
            background: #c82333;
        }
        .edit-btn {
            background: #ffc107;
            color: #333;
            border: none;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.8em;
            transition: background 0.3s ease;
        }
        .edit-btn:hover {
            background: #e0a800;
        }
        .stats {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px solid #eee;
        }
        .stat {
            text-align: center;
        }
        .stat-number {
            font-size: 2em;
            font-weight: 700;
            color: #667eea;
        }
        .stat-label {
            color: #666;
            font-size: 0.9em;
            font-weight: 500;
        }
        .empty-state {
            text-align: center;
            color: #666;
            padding: 40px 20px;
        }
        .empty-state .icon {
            font-size: 4em;
            margin-bottom: 20px;
            opacity: 0.5;
        }
        @media (max-width: 600px) {
            .add-form {
                flex-direction: column;
            }
            .stats {
                flex-wrap: wrap;
                gap: 20px;
            }
            .todo-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
            .todo-actions {
                align-self: flex-end;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <button class="back-btn" onclick="window.location.href='index.html'">← Kembali</button>
            <h1>📝 Perencanaan Liburan</h1>
            <p>Susun aktivitas dan to-do list untuk liburan Anda</p>
        </div>
        <div class="content">
            <form class="add-form" id="todoForm">
                <input type="text" class="add-input" id="todoInput" placeholder="Masukkan aktivitas liburan Anda..." required>
                <button type="submit" class="add-btn">Tambah</button>
            </form>

            <ul class="todo-list" id="todoList">
                <!-- To-do items akan ditampilkan di sini -->
            </ul>

            <div class="stats">
                <div class="stat">
                    <div class="stat-number" id="totalTasks">0</div>
                    <div class="stat-label">Total Tugas</div>
                </div>
                <div class="stat">
                    <div class="stat-number" id="completedTasks">0</div>
                    <div class="stat-label">Selesai</div>
                </div>
                <div class="stat">
                    <div class="stat-number" id="pendingTasks">0</div>
                    <div class="stat-label">Belum Selesai</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // DOM Elements
        const todoForm = document.getElementById('todoForm');
        const todoInput = document.getElementById('todoInput');
        const todoList = document.getElementById('todoList');
        const totalTasksEl = document.getElementById('totalTasks');
        const completedTasksEl = document.getElementById('completedTasks');
        const pendingTasksEl = document.getElementById('pendingTasks');

        // Load todos from localStorage
        let todos = JSON.parse(localStorage.getItem('liburanTodos')) || [];

        // Render todos
        function renderTodos() {
            todoList.innerHTML = '';

            if (todos.length === 0) {
                todoList.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">📋</div>
                        <p>Belum ada aktivitas yang ditambahkan.<br>Mulai tambahkan to-do list liburan Anda!</p>
                    </div>
                `;
            } else {
                todos.forEach((todo, index) => {
                    const li = document.createElement('li');
                    li.className = `todo-item ${todo.completed ? 'completed' : ''}`;

                    li.innerHTML = `
                        <input type="checkbox" class="todo-checkbox" ${todo.completed ? 'checked' : ''} data-index="${index}">
                        <span class="todo-text">${todo.text}</span>
                        <div class="todo-actions">
                            <button class="edit-btn" data-index="${index}">Edit</button>
                            <button class="delete-btn" data-index="${index}">Hapus</button>
                        </div>
                    `;

                    todoList.appendChild(li);
                });
            }

            updateStats();
        }

        // Update statistics
        function updateStats() {
            const total = todos.length;
            const completed = todos.filter(todo => todo.completed).length;
            const pending = total - completed;

            totalTasksEl.textContent = total;
            completedTasksEl.textContent = completed;
            pendingTasksEl.textContent = pending;
        }

        // Add new todo
        function addTodo(text) {
            todos.push({
                text: text,
                completed: false,
                createdAt: new Date().toISOString()
            });
            saveTodos();
            renderTodos();
        }

        // Toggle todo completion
        function toggleTodo(index) {
            todos[index].completed = !todos[index].completed;
            saveTodos();
            renderTodos();
        }

        // Edit todo
        function editTodo(index) {
            const newText = prompt('Edit aktivitas:', todos[index].text);
            if (newText !== null && newText.trim() !== '') {
                todos[index].text = newText.trim();
                saveTodos();
                renderTodos();
            }
        }

        // Delete todo
        function deleteTodo(index) {
            if (confirm('Apakah Anda yakin ingin menghapus aktivitas ini?')) {
                todos.splice(index, 1);
                saveTodos();
                renderTodos();
            }
        }

        // Save todos to localStorage
        function saveTodos() {
            localStorage.setItem('liburanTodos', JSON.stringify(todos));
        }

        // Event listeners
        todoForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const text = todoInput.value.trim();
            if (text) {
                addTodo(text);
                todoInput.value = '';
            }
        });

        todoList.addEventListener('click', (e) => {
            const index = e.target.dataset.index;

            if (e.target.classList.contains('todo-checkbox')) {
                toggleTodo(parseInt(index));
            } else if (e.target.classList.contains('edit-btn')) {
                editTodo(parseInt(index));
            } else if (e.target.classList.contains('delete-btn')) {
                deleteTodo(parseInt(index));
            }
        });

        // Initialize
        renderTodos();
    </script>
</body>
</html>
