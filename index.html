<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do Liburan</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .welcome {
            background: rgba(255, 255, 255, 0.95);
            padding: 60px 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 550px;
            width: 100%;
            text-align: center;
            animation: slideUp 0.6s ease-out;
        }
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        h1 {
            color: #333;
            font-size: 2.5em;
            margin-bottom: 15px;
            font-weight: 700;
        }
        .subtitle {
            color: #666;
            font-size: 1.1em;
            margin-bottom: 40px;
            line-height: 1.6;
            font-weight: 400;
        }
        .icon {
            font-size: 4em;
            margin-bottom: 20px;
            display: block;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            font-family: 'Poppins', sans-serif;
            transition: all 0.3s ease;
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }
        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(102, 126, 234, 0.6);
        }
        button:active {
            transform: translateY(-1px);
        }
        .features {
            margin-top: 40px;
            padding-top: 30px;
            border-top: 2px solid #eee;
            display: flex;
            justify-content: space-around;
            gap: 20px;
        }
        .feature {
            flex: 1;
        }
        .feature-icon {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        .feature-text {
            color: #666;
            font-size: 0.9em;
            font-weight: 500;
        }
        @media (max-width: 600px) {
            .welcome {
                padding: 40px 25px;
            }
            h1 {
                font-size: 1.8em;
            }
            .features {
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>
    <div class="welcome">
        <span class="icon">🌴</span>
        <h1>Susun Rencana Liburan Anda</h1>
        <p class="subtitle">Mulai rencanakan liburan impian Anda dengan mudah dan teratur!</p>
        <button onclick="window.location.href='todo.html'">Mulai Perencanaan</button>
        <div class="features">
            <div class="feature">
                <div class="feature-icon">✓</div>
                <div class="feature-text">Terorganisir</div>
            </div>
            <div class="feature">
                <div class="feature-icon">⚡</div>
                <div class="feature-text">Cepat & Mudah</div>
            </div>
            <div class="feature">
                <div class="feature-icon">🎯</div>
                <div class="feature-text">Efektif</div>
            </div>
        </div>
    </div>
</body>
</html>
